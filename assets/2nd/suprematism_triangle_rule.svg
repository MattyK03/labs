<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f5f1e8"/>

  <!-- Black rotated square -->
  <g transform="translate(150 120) rotate(-45)">
    <rect x="-90" y="-80" width="180" height="110" fill="#d62828"/>
  </g>

  <!-- Green bar (top, angled) -->
  <g transform="translate(200 170) rotate(-45)">
    <rect x="-85" y="-41" width="100" height="20" fill="#003049"/>
  </g>
  <!-- Green bar (top, angled) -->
  <g transform="translate(200 170) rotate(-45)">
    <rect x="-50" y="-21" width="175" height="20" fill="#1d4e89"/>
  </g>

  <!-- Small red rectangle (top) -->
  <g transform="translate(260 210) rotate(-45)">
    <rect x="-35" y="-72" width="40" height="60" fill="#fcbf49"/>
  </g>

  <!-- Vertical green line -->
  <g transform="translate(-100 20) rotate(-3)">
    <rect x="120" y="330" width="12" height="180" fill="#005f73"/>
  </g>

  <!-- Orange circle -->
  <circle cx="200" cy="420" r="28" fill="#ffb703"/>

  <!-- Diagonal dark line -->
  <g transform="rotate(40 300 450)">
    <rect x="280" y="260" width="8" height="400" fill="#9b2226"/>
  </g>

  <!-- Bottom red rotated rectangle -->
  <g transform="translate(300 480) rotate(40)">
    <rect x="20" y="-40" width="48" height="80" fill="#e63946"/>
  </g>

</svg>